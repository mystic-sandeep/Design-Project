<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyGate Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>MyGate Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" value="password123" required>
            
            <select id="role" style="width: 100%; padding: 14px; margin: 10px 0 20px 0; border-radius: 10px; font-size: 16px;">
                <option value="admin">Admin</option>
                <option value="resident">Resident</option>
                <option value="guard">Guard</option>
                <option value="staff">Staff</option>
                <option value="maid">Maid</option>
            </select>
            
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            const response = await fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, role })
            });
            
            const data = await response.json();
            if (data.token) {
                localStorage.setItem('jwt_token', data.token);
                
                const base64Url = data.token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
                
                // Case-insensitive routing fix
                const routes = {
                    'admin': 'dashboards/admin.html',
                    'resident': 'dashboards/resident.html',
                    'guard': 'dashboards/guard.html',
                    'staff': 'dashboards/staff.html',
                    'maid': 'dashboards/maid.html'
                };
                window.location.href = routes[payload.role.toLowerCase()] || 'index.html';
            } else {
                alert('Login failed: ' + data.message);
            }
        });
    </script>
</body>
</html>
